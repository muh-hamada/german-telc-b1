appId: ${APP_ID}
---
# Mock Exam - Full Flow Test (German B1)
# Tests: start a NEW exam → complete all 12 steps → reach results screen
#
# German B1 steps (12 total):
#   1-3: Leseverstehen (Reading) - multiple choice, submit answers
#   4-5: Sprachbausteine (Grammar) - gap fill via modal, submit answers
#   6-8: Hörverstehen (Listening) - Richtig/Falsch, submit answers
#   9:   Schriftlicher Ausdruck (Writing) - type text, evaluate via AI
#   10-12: Mündlicher Ausdruck (Speaking) - skip and continue
#
# testID conventions used:
#   answer-q{index}-{option}  — answer buttons (index=0-based question, option=0-based or true/false)
#   gap-{index}               — grammar gap buttons (0-based)
#   modal-option-{key}        — modal answer options (0-based index or word key)
#
# Prerequisites:
# - HIDE_ADS = true in development.config.ts
# - active-exam = german-b1
# - Onboarding already completed
# - Network access (writing evaluation uses OpenAI API)

- launchApp:
    clearState: false
    stopApp: false

# Dismiss premium upsell modal if visible
- runFlow:
    when:
      visible: "Maybe Later"
    commands:
      - tapOn: "Maybe Later"

# Navigate to Home tab first (app may be on any screen)
- tapOn:
    text: "Home"

# Wait for home screen
- extendedWaitUntil:
    visible:
      text: "Solve Exam Questions.*"
    timeout: 15000

# Navigate to Mock Exam via bottom tab
- tapOn:
    text: "Mock Exam"

# Wait for mock exam screen to load and scroll to top
- scrollUntilVisible:
    element:
      text: "Exam Overview"
    direction: UP
    timeout: 15000

# Verify exam info is displayed
- assertVisible:
    text: ".*300 Points.*"

# Start the exam
- scrollUntilVisible:
    element:
      text: ".*Start Mock Exam.*"
    direction: DOWN
    timeout: 10000
- tapOn:
    text: ".*Start Mock Exam.*"

# Handle existing in-progress exam (tap "Start New" if resume alert appears)
- runFlow:
    when:
      visible: "Start New"
    commands:
      - tapOn: "Start New"
      - extendedWaitUntil:
          visible: "Yes, Start New"
          timeout: 5000
      - tapOn: "Yes, Start New"

# Wait for first step to load
- extendedWaitUntil:
    visible:
      text: ".*Teil 1.*"
    timeout: 15000

