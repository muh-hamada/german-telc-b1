appId: ${APP_ID}
---
# Mock Exam - Start Flow Test (Goethe German A1)
# Verifies mock exam can be started and the first step loads correctly.
#
# Prerequisites:
# - HIDE_ADS = true in development.config.ts
# - active-exam = goethe-german-a1
# - Onboarding already completed

- launchApp:
    clearState: false
    stopApp: false

# Dismiss premium upsell modal if visible
- runFlow:
    when:
      visible: "Maybe Later"
    commands:
      - tapOn: "Maybe Later"

# Navigate to Home tab first (app may be on any screen)
- tapOn:
    text: "Home"

# Wait for home screen to load
- extendedWaitUntil:
    visible:
      text: "Solve Exam Questions.*"
    timeout: 15000

# Navigate to Mock Exam via bottom tab
- tapOn:
    text: "Mock Exam"

# Wait for mock exam screen to load and scroll to top
- scrollUntilVisible:
    element:
      text: "Exam Overview"
    direction: UP
    timeout: 15000

# Verify key information is displayed
- assertVisible:
    text: ".*60 Points.*"
- assertVisible:
    text: ".*65 Minutes.*"
- assertVisible:
    text: ".*36 Points.*60%.*"

# Start the exam
- scrollUntilVisible:
    element:
      text: ".*Start Mock Exam.*"
    direction: DOWN
    timeout: 10000
- tapOn:
    text: ".*Start Mock Exam.*"

# Handle resume dialog if there's an in-progress exam
- runFlow:
    when:
      visible: "Start New"
    commands:
      - tapOn: "Start New"
      - extendedWaitUntil:
          visible: "Yes, Start New"
          timeout: 5000
      - tapOn: "Yes, Start New"

# Wait for first step (reading) to load
- extendedWaitUntil:
    visible:
      text: ".*Teil 1.*"
    timeout: 15000

# Verify step content is shown (exam question UI)
- assertVisible:
    text: ".*Teil 1.*"

# Go back (abandon exam)
- back
